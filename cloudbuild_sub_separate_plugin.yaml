steps:
  # Step 1: Combined Build and Test using Direct Git Fallback
  - name: 'golang:1.25-alpine'
    id: 'go-build-and-test'
    args:
      - '-c'
      - |
        set -e  # Exit if any command fails
        
        # 1. Install build tools needed for compilation
        apk add git make --no-cache
        
        # 2. Revert to direct routing because proxy.golang.org is hard-blocked by Squid
        export GOPRIVATE="github.com/pierrec,google.golang.org,golang.org"
        export GOPROXY="direct"
        export GOSUMDB="off"
        
        # 3. Explicitly define cache directories to keep speeds up inside this step
        export GOCACHE="/workspace/.cache/go-build"
        export GOMODCACHE="/workspace/.cache/mod"
        
        echo "Downloading Go modules directly from source code hosts..."
        go mod download
        
        echo "Running test suite..."
        go test -v -race
        
        echo "Compiling AEAD plugin binary..."
        make build VERSION=$TAG_NAME-$BUILD_ID
        cp vault/plugins/vault-plugin-aead docker/vault-plugin-aead
    entrypoint: /bin/sh

  # Step 2: Build the Container Image
  - name: gcr.io/cloud-builders/docker
    id: 'container-build'
    env:
      - 'P_VERSION=$TAG_NAME-$BUILD_ID'
      - 'P_NAME=${_PLUGIN_NAME}'
      - 'FQ_BASE_IMAGE=${_FQ_BASE_IMAGE}'
    waitFor: ['go-build-and-test']
    args:
      - build
      - '--build-arg'
      - 'P_VERSION=$TAG_NAME-$BUILD_ID'  
      - '--build-arg'
      - 'P_NAME=${_PLUGIN_NAME}' 
      - '-f'
      - 'Dockerfile.plugin'
      - '-t'
      - '${_TARGET}:$TAG_NAME-$BUILD_ID'
      - '-t'
      - '${_TARGET}:$TAG_NAME-$BUILD_ID-rc'
      - .
    dir: docker
    
  # Step 3: Push to Artifact Registry
  - name: gcr.io/cloud-builders/docker
    id: 'container-push'
    waitFor: ['container-build']
    entrypoint: /bin/bash
    args:
    - -c
    - |
      docker push ${_TARGET}:$TAG_NAME-$BUILD_ID
      docker push ${_TARGET}:$TAG_NAME-$BUILD_ID-rc

timeout: 3600s      
images: [ '${_TARGET}:$TAG_NAME-$BUILD_ID', '${_TARGET}:$TAG_NAME-$BUILD_ID-rc' ]
logsBucket: 'gs://${_BUILD_PROJECT}-logging'
options:
  workerPool: projects/${_BUILD_PROJECT}/locations/europe-west1/workerPools/worker-pool2
  env:
    - 'GOPRIVATE=github.com/pierrec,google.golang.org,golang.org'
    - 'GOOS=linux'
    - 'GOARCH=amd64'
    - 'TAG_NAME=$TAG_NAME'