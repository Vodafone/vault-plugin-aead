steps:
  # Step 1: Combined Test and Build Environment (Zero redundant downloading)
  - name: 'golang:1.25-alpine'
    id: 'go-build-and-test'
    args:
      - '-c'
      - |
        set -e
        
        # 1. Quickly add the light build tools & C compiler required for -race
        apk add git make gcc g++ musl-dev --no-cache
        
        # 2. Network Routing definitions matching your corporate proxy behavior
        export GOPRIVATE="github.com/pierrec,google.golang.org,golang.org"
        export GOPROXY="direct"
        export GOSUMDB="off"
        export CGO_ENABLED=1
        
        # 3. Suppress heavy test stdout logs to maximize loop efficiency
        export LOG_LEVEL=error
        export APP_ENV=testing
        
        echo "Fetching all required Go modules precisely once..."
        go mod download
        
        echo "Running your complete test suite with multi-core parallelism..."
        go test -v -race -parallel 4 ./...
        
        echo "Instantly compiling AEAD plugin binary from cached dependencies..."
        make build VERSION=$TAG_NAME-$BUILD_ID
        cp vault/plugins/vault-plugin-aead docker/vault-plugin-aead
    entrypoint: /bin/sh

  # Step 2: Build the Container Image
  - name: gcr.io/cloud-builders/docker
    id: 'container-build'
    env:
      - 'P_VERSION=$TAG_NAME-$BUILD_ID'
      - 'P_NAME=${_PLUGIN_NAME}'
      - 'FQ_BASE_IMAGE=${_FQ_BASE_IMAGE}'
    waitFor: ['go-build-and-test']
    args:
      - build
      - '--build-arg'
      - 'P_VERSION=$TAG_NAME-$BUILD_ID'  
      - '--build-arg'
      - 'P_NAME=${_PLUGIN_NAME}' 
      - '-f'
      - 'Dockerfile.plugin'
      - '-t'
      - '${_TARGET}:$TAG_NAME-$BUILD_ID'
      - '-t'
      - '${_TARGET}:$TAG_NAME-$BUILD_ID-rc'
      - .
    dir: docker
    
  # Step 3: Push Artifacts to Registry
  - name: gcr.io/cloud-builders/docker
    id: 'container-push'
    waitFor: ['container-build']
    entrypoint: /bin/bash
    args:
    - -c
    - |
      docker push ${_TARGET}:$TAG_NAME-$BUILD_ID
      docker push ${_TARGET}:$TAG_NAME-$BUILD_ID-rc

timeout: 3600s      
images: [ '${_TARGET}:$TAG_NAME-$BUILD_ID', '${_TARGET}:$TAG_NAME-$BUILD_ID-rc' ]
logsBucket: 'gs://${_BUILD_PROJECT}-logging'
options:
  workerPool: projects/${_BUILD_PROJECT}/locations/europe-west1/workerPools/worker-pool2
  env:
    - 'GOPRIVATE=github.com/pierrec,google.golang.org,golang.org'
    - 'GOOS=linux'
    - 'GOARCH=amd64'
    - 'TAG_NAME=$TAG_NAME'