steps:
  - name: 'golang:1.25-alpine'
    id: 'go-build-and-test'
    args:
      - '-c'
      - |
        set -e  # Exit immediately if any command fails
        apk add git make --no-cache
        # Configure go to use proxy for faster module downloads
        export GOPRIVATE="github.com/pierrec,google.golang.org"
        export GOPROXY="https://proxy.golang.org"
        export GOSUMDB="sum.golang.org"
        # Download dependencies once (cached for both test and build)
        echo "Downloading Go modules via proxy..."
        go mod download
        # Run tests with race detection
        go test -v -race
        # Build plugin (only runs if tests pass due to set -e)
        make build VERSION=$TAG_NAME-$BUILD_ID
        cp vault/plugins/vault-plugin-aead docker/vault-plugin-aead
    entrypoint: /bin/sh

  - name: gcr.io/cloud-builders/docker
    id: 'container-build'
    env:
      - 'P_VERSION=$TAG_NAME-$BUILD_ID'
      - 'P_NAME=${_PLUGIN_NAME}'
      - 'FQ_BASE_IMAGE=${_FQ_BASE_IMAGE}'
    waitFor: ['go-build-and-test']
    args:
      - build
      - '--build-arg'
      - 'P_VERSION=$TAG_NAME-$BUILD_ID'  
      - '--build-arg'
      - 'P_NAME=${_PLUGIN_NAME}' 
      - '-f'
      - 'Dockerfile.plugin'
      - '-t'
      - '${_TARGET}:$TAG_NAME-$BUILD_ID'
      - '-t'
      - '${_TARGET}:$TAG_NAME-$BUILD_ID-rc'
      - .
    dir: docker
    
  - name: gcr.io/cloud-builders/docker
    id: 'container-push'
    waitFor: ['container-build']
    entrypoint: /bin/bash
    args:
    - -c
    - |
      docker push ${_TARGET}:$TAG_NAME-$BUILD_ID
      docker push ${_TARGET}:$TAG_NAME-$BUILD_ID-rc

timeout: 3600s      
images: [ '${_TARGET}:$TAG_NAME-$BUILD_ID', '${_TARGET}:$TAG_NAME-$BUILD_ID-rc' ]
logsBucket: 'gs://${_BUILD_PROJECT}-logging'
options:
  workerPool: projects/${_BUILD_PROJECT}/locations/europe-west1/workerPools/worker-pool2
  env:
    - 'GOPRIVATE=github.com/pierrec,google.golang.org'
    - 'GOOS=linux'
    - 'GOARCH=amd64'
    - 'TAG_NAME=$TAG_NAME'
    # GOPROXY removed - will use default proxy.golang.org for faster module downloads
    # Private repos still bypass proxy via GOPRIVATE setting above
