steps:
  # Step 1: Optimized Go Environment (Replaces old 'go-test' and 'go-build')
  - name: 'golang:1.25-alpine'
    id: 'go-build-and-test'
    args:
      - '-c'
      - |
        set -e  # Exit immediately if any command inside here fails
        
        # 1. Install build requirements quickly without caching apk indices locally
        apk add git make --no-cache
        
        # 2. OVERRIDE options block constraints to completely avoid direct Git routing
        export GOPRIVATE=""
        export GONOPROXY=""
        export GONOSUMDB=""
        export GOPROXY="https://proxy.golang.org"
        export GOSUMDB="sum.golang.org"
        
        # 3. Pull down dependencies safely and rapidly through Google's proxy mirror
        echo "Downloading Go modules via proxy..."
        go mod download
        
        # 4. Run tests with race detection
        echo "Running test suite..."
        go test -v -race
        
        # 5. Build the plug-in binary (only executes if tests pass successfully)
        echo "Compiling AEAD plugin binary..."
        make build VERSION=$TAG_NAME-$BUILD_ID
        cp vault/plugins/vault-plugin-aead docker/vault-plugin-aead
    entrypoint: /bin/sh

  # Step 2: Build the Container Image
  - name: gcr.io/cloud-builders/docker
    id: 'container-build'
    env:
      - 'P_VERSION=$TAG_NAME-$BUILD_ID'
      - 'P_NAME=${_PLUGIN_NAME}'
      - 'FQ_BASE_IMAGE=${_FQ_BASE_IMAGE}'
    waitFor: ['go-build-and-test']
    args:
      - build
      - '--build-arg'
      - 'P_VERSION=$TAG_NAME-$BUILD_ID'  
      - '--build-arg'
      - 'P_NAME=${_PLUGIN_NAME}' 
      - '-f'
      - 'Dockerfile.plugin'
      - '-t'
      - '${_TARGET}:$TAG_NAME-$BUILD_ID'
      - '-t'
      - '${_TARGET}:$TAG_NAME-$BUILD_ID-rc'
      - .
    dir: docker
    
  # Step 3: Push to Artifact Registry / GCR
  - name: gcr.io/cloud-builders/docker
    id: 'container-push'
    waitFor: ['container-build']
    entrypoint: /bin/bash
    args:
    - -c
    - |
      docker push ${_TARGET}:$TAG_NAME-$BUILD_ID
      docker push ${_TARGET}:$TAG_NAME-$BUILD_ID-rc

timeout: 3600s      
images: [ '${_TARGET}:$TAG_NAME-$BUILD_ID', '${_TARGET}:$TAG_NAME-$BUILD_ID-rc' ]
logsBucket: 'gs://${_BUILD_PROJECT}-logging'
options:
  workerPool: projects/${_BUILD_PROJECT}/locations/europe-west1/workerPools/worker-pool2
  env:
    # Retained for downstream build tools, but cleanly bypassed in Step 1
    - 'GOPRIVATE=github.com/pierrec,google.golang.org'
    - 'GOOS=linux'
    - 'GOARCH=amd64'
    - 'TAG_NAME=$TAG_NAME'